<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prode Mundial 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- AUTH -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-container">
      <div class="auth-logo">
        <div class="auth-logo-text">PRODE</div>
        <div class="auth-logo-sub">Mundial 2026</div>
      </div>
      <div id="login-form" class="auth-form">
        <div class="auth-field"><input type="text" id="login-username" placeholder="Usuario" autocomplete="username"></div>
        <div class="auth-field"><input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password"></div>
        <button class="btn-primary w-full" id="btn-login" style="margin-top:18px;">Entrar</button>
        <div id="login-error" class="auth-error"></div>
        <div class="auth-divider" style="margin-top:20px;"></div>
        <div class="auth-switch"><span id="goto-register">Crear Jugador</span></div>
      </div>
      <div id="register-form" class="auth-form hidden">
        <div class="auth-field"><input type="text" id="reg-display" placeholder="Nombre" autocomplete="name"></div>
        <div class="auth-field"><input type="text" id="reg-username" placeholder="Usuario" autocomplete="username"></div>
        <div class="auth-field"><input type="email" id="reg-email" placeholder="Email" autocomplete="email"></div>
        <div class="auth-field"><input type="password" id="reg-password" placeholder="Contraseña" autocomplete="new-password"></div>
        <div class="auth-field"><input type="password" id="reg-confirm" placeholder="Repetir contraseña" autocomplete="new-password"></div>
        <div class="auth-divider"></div>
        <button class="btn-primary w-full" id="btn-register">Crear Jugador</button>
        <div id="register-error" class="auth-error"></div>
        <div class="auth-switch"><span id="goto-login">← Volver</span></div>
      </div>
      <div class="auth-copa"><img src="static/copa.png" alt="Copa del Mundo"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="app-screen" class="app-screen hidden">

    <!-- Top nav — desktop -->
    <header class="top-nav">
      <div class="top-nav-logo">
        <img src="static/copa.png" class="top-nav-copa" alt="Copa del Mundo">
        <div class="top-nav-title">PRODE <span class="top-nav-sub">MUNDIAL 2026</span></div>
      </div>
      <nav class="top-nav-items">
        <a class="top-nav-item" data-page="inicio">Inicio</a>
        <a class="top-nav-item" data-page="ranking">Ranking</a>
        <a class="top-nav-item" data-page="predicciones">Predecir</a>
        <a class="top-nav-item" data-page="partidos">Partidos</a>
        <a class="top-nav-item" data-page="grupos">Grupos</a>
        <a class="top-nav-item" data-page="ruso">RUSO</a>
      </nav>
      <div class="top-nav-user" id="top-nav-user">
        <div class="sb-avatar" id="sb-avatar"></div>
        <div class="top-nav-user-info">
          <div class="sb-user-name" id="sb-display-name"></div>
          <div class="sb-user-handle" id="sb-username"></div>
        </div>
        <i class="ti ti-chevron-down top-nav-chevron" aria-hidden="true"></i>
        <div class="top-nav-dropdown" id="top-nav-dropdown">
          <div class="top-nav-dropdown-item" id="btn-logout">
            <i class="ti ti-logout" aria-hidden="true"></i> Cerrar sesión
          </div>
        </div>
      </div>
    </header>

    <!-- Mobile header -->
    <div class="mobile-header" style="display:none;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.08);background:#0A0B1E;position:sticky;top:0;z-index:50;">
      <div style="display:flex;align-items:center;gap:8px;">
        <img src="static/copa.png" style="height:26px;width:auto;object-fit:contain;" alt="Copa">
        <div style="font-family:'Big Shoulders Display',system-ui;font-weight:900;font-size:16px;color:#F4F5FF;text-transform:uppercase;letter-spacing:0.02em;">PRODE</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="sb-avatar" id="mobile-avatar" style="width:28px;height:28px;font-size:10px;"></div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(244,245,255,0.55);" id="mobile-display-name"></div>
        <button id="btn-logout-mobile" style="background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:5px 10px;font-size:11px;color:rgba(244,245,255,0.35);cursor:pointer;display:flex;align-items:center;">
          <i class="ti ti-logout" style="font-size:14px;" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <main class="main-content" id="main-content"></main>

    <!-- Bottom nav — mobile -->
    <nav class="bottom-nav" id="bottom-nav">
      <div class="bn-item" data-page="inicio"><i class="ti ti-home" aria-hidden="true"></i><div class="bn-label">Inicio</div><div class="bn-dot"></div></div>
      <div class="bn-item" data-page="ranking"><i class="ti ti-trophy" aria-hidden="true"></i><div class="bn-label">Ranking</div><div class="bn-dot"></div></div>
      <div class="bn-item" data-page="predicciones"><i class="ti ti-target" aria-hidden="true"></i><div class="bn-label">Predecir</div><div class="bn-dot"></div></div>
      <div class="bn-item" data-page="partidos"><i class="ti ti-ball-football" aria-hidden="true"></i><div class="bn-label">Partidos</div><div class="bn-dot"></div></div>
      <div class="bn-item" data-page="grupos"><i class="ti ti-users" aria-hidden="true"></i><div class="bn-label">Grupos</div><div class="bn-dot"></div></div>
    </nav>

  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pages/inicio.js"></script>
  <script src="js/pages/ranking.js"></script>
  <script src="js/pages/predicciones.js"></script>
  <script src="js/pages/partidos.js"></script>
  <script src="js/pages/grupos.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
